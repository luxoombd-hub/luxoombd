backend:
name: github
  repo: luxoombd-hub/luxoombd
  branch: main

media_folder: "assets/images" # ছবিগুলো এখানে জমা হবে
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "Product (পণ্য যোগ করুন)"
    folder: "content/products"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Product Name (নাম)", name: "title", widget: "string" }
      - { label: "Price (দাম)", name: "price", widget: "number" }
      - { label: "Discount Price (ছাড়ের দাম)", name: "discount_price", widget: "number", required: false }
      - { label: "Feature Video Link", name: "video_url", widget: "string", required: false }
      - { label: "Product Image (ছবি)", name: "image", widget: "image" }
      - { label: "Description (বিবরণ)", name: "body", widget: "markdown" }
      - { label: "Stock Available?", name: "stock", widget: "boolean", default: true }

  - name: "settings"
    label: "Website Settings (ডিজাইন পরিবর্তন)"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "WhatsApp Number", name: "wa_number", widget: "string" }
          - { label: "Main Video Background", name: "hero_video", widget: "string" }
          - { label: "Show Offer Banner?", name: "show_banner", widget: "boolean", default: true }