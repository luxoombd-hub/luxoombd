<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxoom BD | Luxury Eyewear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #050505; color: #f4f4f4; }
        .gold-text { color: #D4AF37; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 bg-black/90 border-b border-zinc-800 p-4 text-center">
        <h1 class="text-2xl font-bold gold-text tracking-widest uppercase">LUXOOM BD</h1>
    </header>

    <section class="h-screen flex items-center justify-center text-center px-4">
        <div>
            <h2 class="text-5xl md:text-7xl font-bold mb-4">Premium Eyewear</h2>
            <p class="text-xl gold-text mb-8">বিলাসবহুল চশমা এবং লেন্সের সেরা কালেকশন</p>
            <a href="#order" class="bg-[#D4AF37] text-black px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition duration-300">অর্ডার করুন</a>
        </div>
    </section>

    <section id="order" class="py-20 px-6 bg-zinc-950">
        <div class="max-w-xl mx-auto glass-card p-8 rounded-3xl">
            <h3 class="text-2xl font-bold text-center mb-6 gold-text">অর্ডার তথ্য দিন</h3>
            <form id="orderForm" class="space-y-4">
                <input type="text" id="name" placeholder="আপনার নাম" class="w-full p-4 bg-zinc-900 rounded-xl border border-zinc-800 outline-none focus:border-gold" required>
                <input type="tel" id="phone" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-zinc-900 rounded-xl border border-zinc-800 outline-none focus:border-gold" required>
                <textarea id="address" placeholder="আপনার সম্পূর্ণ ঠিকানা" class="w-full p-4 bg-zinc-900 rounded-xl border border-zinc-800 outline-none focus:border-gold" required></textarea>
                <button type="submit" class="w-full bg-[#D4AF37] text-black font-bold py-4 rounded-xl text-xl">হোয়াটসঅ্যাপে অর্ডার করুন</button>
            </form>
        </div>
    </section>

    <script>
        // হোয়াটসঅ্যাপে মেসেজ পাঠানো
        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const text = `*নতুন অর্ডার - Luxoom BD*%0A👤 নাম: ${name}%0A📞 ফোন: ${phone}%0A🏠 ঠিকানা: ${address}`;
            window.open(`https://wa.me/8801700000000?text=${text}`, '_blank'); // আপনার নম্বর বসিয়ে নিন
        };

        // নেটলিফাই লগইন রিডাইরেক্ট
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
